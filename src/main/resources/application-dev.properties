spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/academicai?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

app.jwt.secret=${JWT_SECRET:my-super-secret-jwt-key-for-local-development-12345}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
app.lecturer-registration.code=${LECTURER_REGISTRATION_CODE:lecturer-dev-code}
app.swagger.public=${SWAGGER_PUBLIC:true}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
