spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.refresh-token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:30}
app.email-verification.expiration-minutes=${EMAIL_VERIFICATION_EXPIRATION_MINUTES:30}
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:15}
app.security.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
app.security.login.lock-minutes=${LOGIN_LOCK_MINUTES:15}
app.lecturer-registration.code=${LECTURER_REGISTRATION_CODE:}
app.swagger.public=${SWAGGER_PUBLIC:false}
app.public-url=${APP_PUBLIC_URL:http://localhost:8081}
app.email.enabled=${EMAIL_ENABLED:false}
app.email.from=${EMAIL_FROM:no-reply@academicai.local}
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

app.upload.dir=${UPLOAD_DIR:./uploads}
groq.api.key=${GROQ_API_KEY:}

server.forward-headers-strategy=framework
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.schoolproject.app=${LOG_LEVEL_APP:INFO}
